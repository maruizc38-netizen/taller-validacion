<!--Desarrollar un formulario que permita cambiar la contraseña. Solicitar: 
● Contraseña actual 
● Nueva contraseña 
● Confirmar contraseña Validar: 
● Contraseña mínima 8 caracteres 
● Coincidencia entre contraseñas -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class=" contenedor">
        <h2>cambio de contraseña </h2>
        <form id="registro_contrasena">
            <label>contraseña actual</label>
            <input type="password" id="contrasena_actual" name="contrasena_actual" placeholder="contraseña actual" required><br><br>
            <div id=errorcontrasena_actual class="error"></div>
            <label>nueva contraseña</label>
            <input type="password" id="nueva_contrasena" name="nueva_contrasena" placeholder="nueva contraseña" required><br><br>
            <div id=errornueva_contrasena class="error"></div>
            <label>confirmar contraseña</label>
            <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" placeholder="confirmar contraseña" required><br><br>
            <div id=errorconfirmar_contrasena class="error"></div>
            <button type="submit">cambiar contraseña</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="contrasena.js"></script>
