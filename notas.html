<!--Desarrollar un sistema que permita registrar:
● Nombre del estudiante
● 3 notas
Calcular:
● Promedio
Validar:
● Notas entre 0 y 5
Mostrar:
● Aprobado
● Reprobado-->
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class=" contenedor">
        <h2>registro de notas </h2>
        <form id="registro_notas">
            <label>nombre estudiante</label>
            <input type="text" id="nombre" name="nombre" placeholder="nombre estudiante" required><br><br>
            <div id=errornombre class="error"></div>
            <label>nota 1</label>
            <input type="number" id="nota1" name="nota1" placeholder="nota 1" required><br><br>
            <div id=errornota1 class="error"></div>
            <label>nota 2</label>
            <input type="number" id="nota2" name="nota2" placeholder="nota 2" required><br><br>
            <div id=errornota2 class="error"></div>
            <label>nota 3</label>
            <input type="number" id="nota3" name="nota3" placeholder="nota 3" required><br><br>
            <div id=errornota3 class="error"></div>
            <button type="submit">registrar</button>
        </form>
        <div id="mensaje"></div>
        <div id="promedio"></div>
    </div>
    <script src="notas.js"></script>
</body>

</html>
