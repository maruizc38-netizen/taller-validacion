<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class=" contenedor">
        <h2>registro de estudiantes </h2>
        <form id="registro_estu">
            <label>nombre estudiante</label>
            <input type="text" id="nombre" name="nombre" placeholder="nombre estudiante" required><br><br>
            <div id=errornombre class="error"></div>
            <label>correo</label>
            <input type="email" id="correo" name="correo" placeholder="correo electronico" required><br><br>
            <div id=errorcorreo class="error"></div>
            <label>edad</label>
            <input type="number" id="edad" name="edad" placeholder="edad" required><br><br>
            <div id=erroredad class="error"></div>
            <label>programa de formacion</label>
            <input type="text" id="programa" name="programa" placeholder="programa de formacion" required><br><br>
            <div id=errorprograma class="error"></div>
            <button type="submit">registrar</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="estudiantes.js"></script>
</body>

</html>
